services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: epic_fhir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d epic_fhir"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/epic_fhir
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
